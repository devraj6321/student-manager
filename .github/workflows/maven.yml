name: Java CI with Maven

on:
  push:
    branches:
      - "feature/*"
      - "release"
  pull_request:
    branches:
      - "develop"

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B package --file pom.xml

      - name: Update dependency graph
        uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6

  deploy:
    if: github.ref == 'refs/heads/release'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn -B package --file pom.xml

      - name: Deploy application
        env:
          LOCAL_BUILD_DIR: ${{ secrets.LOCAL_BUILD_DIR }}
        run: |
          # Copy the built JAR file to the local deployment directory
          cp target/your-app.jar $LOCAL_BUILD_DIR
          cd $LOCAL_BUILD_DIR
          # Stop the current running application
          pkill -f 'your-app.jar' || true
          # Start the new version
          nohup java -jar your-app.jar &
        shell: bash

